<!doctype html>
<!-- Страница 404 для Firebase Hosting: файл 404.html в корне build/ подхватывается
     хостингом автоматически и отдаётся с честным кодом 404 (researches/08 §7).
     SvelteKit при полном пререндере её не генерирует, поэтому она живёт в static/.
     Автономный HTML: токены тем скопированы из src/routes/+layout.svelte,
     скрипт темы — из src/app.html (то же поведение, без мигания). -->
<html lang="ru">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="theme-color" content="#f6f8fb" />
		<title>404 — страницы нет · NDim Space</title>
		<link rel="icon" href="/favicon.svg" type="image/svg+xml" />
		<script>
			(function () {
				try {
					var t = localStorage.getItem('ndim-theme') || 'light';
					var d = document.documentElement;
					d.setAttribute('data-theme', t);
					var m = document.querySelector('meta[name="theme-color"]');
					if (m) m.setAttribute('content', t === 'dark' ? '#060b14' : '#f6f8fb');
				} catch (e) {}
			})();
		</script>
		<style>
			:root {
				--bg: #f6f8fb;
				--edge: #e6eef7;
				--accent: #1f7fc9;
				--heading: #12263c;
				--text: #33506e;
				--dim: #6a819a;
				--ghost-brd: rgba(20, 103, 214, 0.35);
				--ghost-ink: #1a63c4;
			}
			:root[data-theme='dark'] {
				--bg: #060b14;
				--edge: rgba(77, 159, 255, 0.22);
				--accent: #3fd9ff;
				--heading: #eef6ff;
				--text: #dce9f7;
				--dim: #8299b1;
				--ghost-brd: rgba(63, 217, 255, 0.45);
				--ghost-ink: #a8e2ff;
			}
			* {
				margin: 0;
				padding: 0;
				box-sizing: border-box;
			}
			body {
				font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
				background: var(--bg);
				color: var(--text);
				min-height: 100vh;
				display: grid;
				place-items: center;
				text-align: center;
				padding: 24px;
			}
			.code {
				font-size: 72px;
				font-weight: 800;
				color: var(--accent);
				letter-spacing: 0.04em;
			}
			h1 {
				color: var(--heading);
				font-size: 22px;
				margin: 8px 0 4px;
			}
			p {
				color: var(--dim);
				font-size: 15px;
			}
			a {
				display: inline-block;
				margin-top: 24px;
				padding: 10px 22px;
				border: 1px solid var(--ghost-brd);
				border-radius: 10px;
				color: var(--ghost-ink);
				text-decoration: none;
				font-weight: 600;
			}
		</style>
	</head>
	<body>
		<main>
			<div class="code">404</div>
			<h1>Такой страницы в Пространстве нет</h1>
			<p>This page does not exist in the Space.</p>
			<a href="/">На главную · Home</a>
		</main>
	</body>
</html>
