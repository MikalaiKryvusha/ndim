<!doctype html>
<html lang="ru">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="theme-color" content="#f6f8fb" />
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" type="image/svg+xml" />
		<!-- Тема и язык применяются ДО отрисовки, чтобы не было мигания:
		     читаем сохранённый выбор (дефолт — светлая тема, русский язык) и
		     выставляем атрибуты на <html>. CSS-переменные тем ключуются на data-theme. -->
		<script>
			(function () {
				try {
					var t = localStorage.getItem('ndim-theme') || 'light';
					var l = localStorage.getItem('ndim-lang') || 'ru';
					var d = document.documentElement;
					d.setAttribute('data-theme', t);
					d.setAttribute('lang', l);
					var m = document.querySelector('meta[name="theme-color"]');
					if (m) m.setAttribute('content', t === 'dark' ? '#060b14' : '#f6f8fb');
				} catch (e) {}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
